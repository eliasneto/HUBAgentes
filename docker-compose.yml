services:
  db:
    image: mysql:8.4
    container_name: HUB_Agentes_mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${DATABASE_NAME:-hub_agentes}
      MYSQL_USER: ${DATABASE_USER:-hub_agentes}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD:-hub_agentes_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password_change_me}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 40s

  web:
    build: .
    container_name: HUB_Agentes_web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_ENGINE: mysql
      DATABASE_NAME: ${DATABASE_NAME:-hub_agentes}
      DATABASE_USER: ${DATABASE_USER:-hub_agentes}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-hub_agentes_password}
      DATABASE_HOST: db
      DATABASE_PORT: 3306
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8010:8010"

    volumes:
      - media_data:/app/media
      - staticfiles_data:/app/staticfiles
      - ${LOCAL_STORAGE_PATH:-./entradas}:/app/entradas:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8010/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  worker:
    build: .
    container_name: HUB_Agentes_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_ENGINE: mysql
      DATABASE_NAME: ${DATABASE_NAME:-hub_agentes}
      DATABASE_USER: ${DATABASE_USER:-hub_agentes}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-hub_agentes_password}
      DATABASE_HOST: db
      DATABASE_PORT: 3306
    depends_on:
      web:
        condition: service_healthy
    volumes:
      - media_data:/app/media
      - ${LOCAL_STORAGE_PATH:-./entradas}:/app/entradas:ro
    command: >
      sh -c "
        ULTIMO_MES_LIMPEZA='';
        while true; do
          python manage.py reconciliar_processamentos_orfaos;
          HORA_ATUAL=$(date +%H);
          DIA_ATUAL=$(date +%d);
          MES_ATUAL=$(date +%Y-%m);
          if [ \"$$HORA_ATUAL\" = '00' ] && [ \"$$MES_ATUAL\" != \"$$ULTIMO_MES_LIMPEZA\" ]; then
            python manage.py limpar_arquivos_saida --check-day;
            if [ $$? -eq 0 ]; then
              ULTIMO_MES_LIMPEZA=$$MES_ATUAL;
            fi;
          fi;
          sleep 300;
        done
      "

volumes:
  mysql_data:
  media_data:
  staticfiles_data:
