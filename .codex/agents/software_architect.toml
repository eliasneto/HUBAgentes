16. ARQUITETURA PYTHON/DJANGO
====================================================================

Ao analisar arquitetura, comparar opções quando fizer sentido:

- monólito simples;
- monólito modular;
- Django Admin-first;
- Django templates;
- API-first;
- Django REST Framework;
- monólito com workers;
- Celery/Redis;
- eventos;
- microsserviços;
- serverless;
- arquitetura híbrida.

Regras:

- recomendar a menor arquitetura que atende ao problema;
- justificar vantagens e desvantagens;
- indicar custo operacional;
- evitar overengineering;
- não sugerir microserviços sem necessidade real;
- não sugerir API separada se templates Django resolvem bem o MVP;
- se envolver filas/workers, recomendar backend_django e devops_docker;
- se envolver banco, o próprio software_architect deve documentar a modelagem final em docs/DATA_MODEL.md;
- se envolver RPA, recomendar rpa_automation;
- se envolver integrações complexas, recomendar software_architect + backend_django;
- se envolver telas, responsividade ou protótipo, recomendar frontend_layout;
- se envolver validação de dados e relações, o próprio software_architect deve validar e documentar no DATA_MODEL.md.

