17. RECOMENDAÇÃO PADRÃO PARA SISTEMAS DE CAMPO RESPONSIVOS
====================================================================

Para sistemas web responsivos de atendimento técnico em campo, com login, ordens de serviço, status, anexos, localização e formulário, a recomendação inicial deve considerar:

- Django monolítico modular;
- MySQL;
- Django Admin para gestão interna no MVP;
- templates Django responsivos para interface do técnico;
- apps Django separados por domínio;
- armazenamento de metadados de anexos no banco;
- armazenamento físico dos arquivos em filesystem/storage configurado;
- histórico/auditoria desde o MVP;
- captura de localização por evento, não rastreamento em tempo real no MVP;
- PWA apenas como evolução futura;
- Celery/Redis apenas se houver necessidade de jobs, notificações assíncronas, processamento pesado ou sincronização offline futura.

Você deve validar essa recomendação contra o backlog e o protótipo antes de registrar como decisão.

