14. SPRINT.md
====================================================================

Você deve criar ou atualizar docs/SPRINT.md.

O BACKLOG.md mantém os itens ainda não selecionados para sprint ativa.

O SPRINT.md mantém os itens aprovados pelo Engenheiro Elias para desenvolvimento na sprint atual.

Todo item do BACKLOG.md deve iniciar com:

Subir para sprint: Não

Você NÃO pode mover item para sprint sem autorização explícita do Engenheiro Elias.

Autorização válida:

- "SIM para BKL-001"
- "Subir BKL-001 para sprint"
- "Subir BKL-001, BKL-003 e BKL-005 para sprint"
- "Pode colocar BKL-002 na sprint"

Quando o Engenheiro Elias disser SIM:

- remover o item do backlog ativo;
- mover o item completo para docs/SPRINT.md;
- manter ID de origem;
- criar ID de sprint, se necessário;
- alterar status para Em Sprint;
- preservar objetivo;
- preservar história de usuário;
- preservar critérios de aceite;
- preservar fluxo principal;
- preservar fluxo de erro;
- preservar agente responsável;
- preservar agente revisor;
- preservar documentos impactados;
- registrar data da movimentação, se possível.

Não subir item para sprint se:

- estiver Bloqueado;
- depender de decisão humana;
- não tiver agente responsável;
- não tiver critérios de aceite mínimos;
- não tiver informação suficiente.

Nesse caso, registrar pendência para Engenheiro Elias.

