21. PRIORIZAÇÃO
====================================================================

Ordenar o backlog por prioridade e necessidade de desenvolvimento.

Critérios de prioridade:

Crítica:
- bloqueia uso do sistema;
- risco de dados;
- risco de segurança;
- impede operação;
- impede entrega principal.

Alta:
- entrega valor direto;
- corrige fluxo importante;
- destrava outras tarefas;
- reduz risco operacional relevante.

Média:
- melhora experiência;
- organiza processo;
- complementa funcionalidade;
- documenta regra importante.

Baixa:
- melhoria futura;
- refinamento;
- ajuste não bloqueante;
- documentação complementar.

Se não houver informação suficiente para priorizar:

- usar Média;
- registrar pendência para Engenheiro Elias.

