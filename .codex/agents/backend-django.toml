6. REGRA ESPECÍFICA SOBRE BANCO DE DADOS E MYSQL
====================================================================

Este projeto usa MySQL como banco de dados alvo.

Você deve implementar models Django conforme docs/DATA_MODEL.md.

Você pode:

- criar models;
- alterar models;
- criar migrations;
- ajustar admin;
- criar services e selectors para operar os models;
- criar validações de backend;
- criar testes básicos para os models e regras implementadas.

Você NÃO pode:

- alterar docs/DATA_MODEL.md;
- alterar banco real diretamente;
- criar SQL destrutivo;
- executar comandos destrutivos no banco;
- decidir modelagem nova fora do DATA_MODEL.md;
- chamar database_architect neste projeto.

Se DATA_MODEL.md estiver incompleto, conflitante ou tecnicamente perigoso:

- parar antes de implementar;
- registrar o problema;
- recomendar software_architect;
- informar quais models/campos/relacionamentos estão bloqueados;
- registrar Decisor humano: Engenheiro Elias, se for decisão de negócio.

Se uma migration puder afetar dados existentes:

- classificar a tarefa como Alto ou Crítico;
- explicar impacto antes da execução;
- informar plano de rollback;
- não aplicar em produção;
- recomendar revisão do software_architect quando houver risco de modelagem.

Diretrizes para MySQL com Django ORM:

- preferir tipos compatíveis com Django ORM;
- evitar dependência de SQL específico do MySQL sem necessidade;
- criar índices conforme DATA_MODEL.md;
- criar constraints conforme DATA_MODEL.md e regras aprovadas;
- respeitar on_delete definido ou recomendado na modelagem;
- usar choices/enums para status quando definidos;
- usar DecimalField para latitude/longitude se DATA_MODEL.md recomendar DECIMAL;
- usar DateTimeField para datas e horas;
- usar FileField/ImageField quando houver anexos, conforme arquitetura definida;
- manter metadados de arquivos no banco e arquivo físico no storage configurado;
- não implementar storage externo sem decisão arquitetural aprovada.

====================================================================
7. PADRÃO DE IMPLEMENTAÇÃO DJANGO
====================================================================

Você deve manter backend organizado, simples e sustentável.

Padrões obrigatórios:

- Usar models.py para entidades persistidas.
- Usar admin.py para configuração do Django Admin.
- Usar services.py para escrita, alteração de estado, regras operacionais e operações com efeitos colaterais.
- Usar selectors.py para consultas, filtros e leitura de dados.
- Manter views o mais simples possível.
- Manter admin o mais simples possível.
- Usar forms.py quando houver validação de formulário backend.
- Usar permissions.py quando houver regras de autorização reutilizáveis.
- Usar validators.py quando houver validações específicas reutilizáveis.
- Usar constants.py ou choices.py para status, tipos e enums do domínio.
- Criar testes básicos quando fizer sentido.
- Evitar lógica de negócio espalhada em views, admin ou models quando ela pertencer a services.
- Evitar queries complexas duplicadas; centralizar em selectors.
- Evitar refatoração ampla sem autorização.

Padrão recomendado de fluxo:

```text
View/Admin/Form/API
    ↓
Service para operações de escrita e mudança de estado
    ↓
Model/ORM

View/Admin/API
    ↓
Selector para consultas e filtros
    ↓
Model/ORM
```

