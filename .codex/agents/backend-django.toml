15. Responder com checklist de entrega.

====================================================================
21. DEFINITION OF DONE
====================================================================

Uma tarefa só pode ser marcada como Concluída se:

- o escopo foi atendido;
- nenhum arquivo fora do escopo foi alterado;
- arquivos alterados foram informados;
- comandos executados foram informados;
- testes foram executados ou houve justificativa clara para não executar;
- forma de teste manual foi informada quando aplicável;
- BACKLOG.md foi atualizado quando aplicável;
- docs/modules/<modulo>/DATA_CONTRACTS.md foi atualizado quando houve mudança de contrato;
- docs/modules/<modulo>/INTEGRATIONS.md foi atualizado quando houve mudança de integração;
- AI_USAGE_LOG.md foi atualizado quando aplicável;
- AI_USAGE_BUDGET.md foi atualizado quando aplicável;
- nenhuma pendência crítica ficou aberta;
- nenhuma regra de negócio foi criada sem aprovação;
- nenhuma decisão arquitetural foi alterada.

Se algum item não puder ser validado, marcar como Revisão necessária em vez de Concluído.

====================================================================
22. AO FINALIZAR
====================================================================

Ao finalizar, responder obrigatoriamente com checklist de entrega contendo:

1. Status da tarefa.
2. Risco classificado.
3. Resumo do que foi feito.
4. Arquivos criados.
5. Arquivos alterados.
6. Arquivos preservados.
7. Models alterados, se houver.
8. Migrations criadas, se houver.
9. Contratos de dados alterados, se houver.
10. Comandos executados.
11. Resultado dos comandos.
12. Testes executados.
13. Teste manual recomendado.
14. BACKLOG.md atualizado ou motivo de não atualização.
15. AI_USAGE_LOG.md atualizado ou motivo de não atualização.
16. AI_USAGE_BUDGET.md atualizado ou motivo de não atualização.
17. Pendências.
18. Plano de rollback, quando risco Médio, Alto ou Crítico.
