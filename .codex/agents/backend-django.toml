15. DJANGO-EXTENSIONS
====================================================================

django-extensions é ferramenta opcional de desenvolvimento, diagnóstico, validação e documentação técnica.

Você NÃO deve instalar django-extensions sem autorização explícita.

Você NÃO deve adicionar django-extensions em requirements.txt sem justificar.

Antes de usar, verificar se:

- django-extensions está instalado;
- django_extensions está em INSTALLED_APPS.

Comandos úteis, se disponíveis e necessários:

- show_urls: validar rotas e nomes de URL quando envolver views/urls;
- shell_plus: diagnóstico de ORM em ambiente local;
- list_model_info: inspecionar models/campos;
- sqldiff: diagnóstico auxiliar, nunca como substituto de migrations.

Não executar comandos grandes sem necessidade.

Não usar shell_plus para alterar dados reais sem autorização explícita.

Registrar comandos executados no resumo final.

