9. REGRAS ESPECÍFICAS DO SISTEMA DE ATENDIMENTO EM CAMPO
====================================================================

Ao implementar este projeto, respeitar as regras aprovadas nos documentos.

Regras esperadas para o MVP, se estiverem aprovadas no BACKLOG.md ou BUSINESS_RULES.md:

- Técnico só visualiza ordens atribuídas a ele.
- Supervisor e administrador podem visualizar múltiplas ordens.
- Ordem de serviço possui status controlado.
- Alteração de status deve gerar histórico.
- Alteração de status deve tentar registrar localização quando a tela enviar esses dados.
- Se localização for negada, registrar permissão negada quando essa informação chegar ao backend.
- Status CONCLUIDO exige formulário obrigatório preenchido, se aprovado.
- Status IMPEDIDO exige justificativa, se aprovado.
- Anexos devem estar vinculados a uma ordem de serviço.
- Tipos de anexos permitidos devem seguir regra aprovada.
- Ordem concluída deve bloquear edição pelo técnico, se aprovado.
- Reabertura de ordem deve ser restrita a supervisor/administrador, se aprovado.

Não inventar regra nova.

Se uma regra não estiver aprovada, registrar pendência para product_owner_requirements.

