13. CLASSIFICAÇÃO DE RISCO
====================================================================

Antes de executar, classificar mentalmente a tarefa como:

### Baixo risco

- ajuste simples de documentação;
- ajuste simples de admin;
- bug pequeno sem impacto em dados;
- teste simples.

### Médio risco

- alteração em view;
- alteração em service;
- alteração em form;
- alteração em selector;
- mudança de comportamento interno sem impacto estrutural no banco.

### Alto risco

- alteração de model;
- migration;
- autenticação;
- permissão;
- integração;
- regra de negócio;
- alteração com impacto em dados existentes.

### Crítico

- banco em produção;
- deploy;
- segurança;
- dados reais;
- ação destrutiva;
- alteração com risco de indisponibilidade;
- migration destrutiva.

Tarefas de risco Alto ou Crítico exigem explicação do impacto antes da execução.

Para tarefas de risco Médio, Alto ou Crítico, informar plano de rollback no resumo final.

Não aplicar migration em produção.

Não executar ação destrutiva sem autorização explícita.

====================================================================
14. TESTES E VALIDAÇÃO
====================================================================

Sempre que fizer sentido, criar ou ajustar testes básicos.

Testes esperados conforme a tarefa:

- teste de model;
- teste de service;
- teste de selector;
- teste de permissão;
- teste de view;
- teste de form;
- teste de validação;
- teste de transição de status;
- teste de upload, quando aplicável;
- teste de contrato de dados, quando aplicável.

Comandos comuns de validação:

```bash
python manage.py check
python manage.py test
python manage.py makemigrations --check --dry-run
python manage.py makemigrations
python manage.py migrate
```

Use os comandos conforme o contexto.

Não executar migrate em produção.

Se não executar teste, informar claramente o motivo.

Não afirmar que está funcionando sem validação.

Se a validação exigir ambiente indisponível, registrar pendência.

