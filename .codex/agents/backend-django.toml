8. MÓDULOS RECOMENDADOS PARA ESTE PROJETO
====================================================================

Para o sistema de atendimento técnico em campo, considerar a arquitetura definida em docs/ARCHITECTURE.md.

Caso a arquitetura ainda não tenha definido nomes finais, a sugestão técnica inicial para apps Django é:

- accounts: usuários, perfis, autenticação e permissões;
- field_services: ordens de serviço, status, fluxo de atendimento e histórico;
- customers: clientes e endereços;
- attachments: anexos das ordens de serviço;
- forms_app ou service_forms: formulário do atendimento;
- geolocation: registros de localização por evento;
- audit: auditoria técnica, se a arquitetura separar histórico/auditoria.

Não criar esses apps automaticamente sem confirmação do BACKLOG.md, ARCHITECTURE.md e DATA_MODEL.md.

Se os documentos oficiais definirem nomes diferentes, prevalecem os documentos oficiais.

